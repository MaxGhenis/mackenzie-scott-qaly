name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Test (pytest)
        run: uv run pytest

      - name: Params export stays in sync
        run: |
          uv run msqaly-export-params
          git diff --exit-code web/params.json \
            || (echo "::error::web/params.json is stale — run 'uv run msqaly-export-params' and commit" && exit 1)

      - name: Model runs end-to-end
        run: uv run msqaly --n 5000
