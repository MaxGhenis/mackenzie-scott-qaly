# =============================================================================
# Parameters for the MacKenzie Scott QALY cost-effectiveness model.
#
# Single source of truth. Every value carries a `source`. Distributions are
# sampled in Monte Carlo (see src/msqaly/distributions.py for supported forms):
#   fixed | uniform | loguniform | triangular | normal | lognormal_ci
# `lognormal_ci` interprets {low, high} as the 5th/95th percentiles.
#
# Philosophy (GiveWell-style): wherever possible a cost-per-QALY is DERIVED
# from a causal effect estimate in the literature (cost-per-life, mortality
# effect) rather than asserted. Indirect buckets (education, equity, civic,
# arts) get wide distributions and an explicit, separate realization discount.
# =============================================================================

meta:
  total_giving_usd: 2.63e+10   # $26.3B (signed exponent so YAML parses it as float)
  total_giving_source: >-
    MacKenzie Scott cumulative giving since 2019, ~$26.3B to >1,600 orgs as of
    Dec 2025 ($7.17B in 2025 alone). CNBC 2025-12-13; Alliance Magazine 2025.
  base_year: 2026
  discount_rate: 0.03        # standard health-economics annual discount rate
  # Floor on any sampled cost-per-QALY. Guards against fat-tailed reciprocals
  # (QALYs = $/cpq blows up as cpq -> 0). No US social/health intervention
  # plausibly beats a few $k/QALY; the global-health frontier (~$80) is a
  # different universe. Set well below every central estimate so it only clips
  # implausible tails.
  cost_per_qaly_floor_usd: 5000

# ---------------------------------------------------------------------------
# Shared conversion parameters
# ---------------------------------------------------------------------------
conversions:

  # Quality-adjusted life-years gained per premature death averted. Derived in
  # code as a discounted, quality-weighted annuity over remaining life years.
  # Calibrated to the low-income, middle-aged/older adults who dominate the
  # causal mortality studies (Medicaid expansion, community health centers).
  qaly_per_death_averted:
    remaining_life_expectancy: {dist: normal, mean: 26, sd: 4, min: 5}
    utility_weight: {dist: triangular, low: 0.60, mode: 0.78, high: 0.92}
    source: >-
      Remaining life expectancy ~26y for low-income adults ~age 55 (the
      populations in Miller et al. 2021 and Bailey & Goodman-Bacon 2015);
      utility weight ~0.78 typical for this age/health. Discounted at 3%.

  # Value of a statistical life-year, used only to MONETIZE the QALYs for a
  # benefit/cost ratio. Not used to compute QALYs.
  vsly_usd:
    dist: triangular
    low: 231000
    mode: 611000
    high: 1030000
    source: >-
      HHS ASPE Standard Values for Regulatory Analysis 2026: VSLY central
      $611k (3% discount), $1.03M (7%); 2024 low estimate $231k.

  # Global-health frontier cost-per-QALY, for the counterfactual comparison
  # ("what if the same dollars bought QALYs at the best global rate").
  frontier_cost_per_qaly_usd:
    dist: loguniform
    low: 50
    high: 150
    source: >-
      GiveWell long-lasting insecticide-treated nets ~$78 per DALY averted
      ($3,340 per life saved); top-charity range ~$50-150 per QALY/DALY.

# ---------------------------------------------------------------------------
# Realization factor: GiveWell-style adjustment applied to ALL archetypes.
# Captures the gap between a clean study/program estimate and the marginal
# real-world dollar Scott actually granted: external validity, leakage to
# overhead, counterfactual funging — NET of the documented capacity benefits
# of large unrestricted gifts (which can push it toward / above 1).
# ---------------------------------------------------------------------------
realization_factor:
  dist: triangular
  low: 0.40
  mode: 0.75
  high: 1.10
  source: >-
    Author adjustment. Downward: GiveWell-style internal/external-validity and
    funging discounts. Upward: Center for Effective Philanthropy (2023) finds
    large unrestricted gifts materially expand recipient capacity/reach.

# ---------------------------------------------------------------------------
# Dirichlet concentration governing uncertainty in the dollar allocation
# across archetypes. Higher = allocation shares held closer to central values.
# ---------------------------------------------------------------------------
allocation_concentration: 60

# ---------------------------------------------------------------------------
# Intervention archetypes. allocation_share = central fraction of total $.
# Shares sum to 1.0 (validated in tests).
# ---------------------------------------------------------------------------
archetypes:

  health_coverage:
    label: "Health - insurance & access"
    allocation_share: 0.06
    method: cost_per_life            # cost_per_qaly = cost_per_life / qaly_per_death
    cost_per_life_usd: {dist: loguniform, low: 327000, high: 867000}
    source: >-
      Miller, Johnson & Wherry (2021), QJE 136(3): Medicaid expansion saved
      ~1 life/yr per 239-316 adults gaining coverage; implied $327k-$867k per
      life saved (0.132 pp annual mortality decline, 9.4% reduction).

  health_chc:
    label: "Health - community health centers"
    allocation_share: 0.05
    method: cost_per_qaly_derived_chc  # = medicare_cost_per_lifeyear * chc_fraction
    medicare_cost_per_lifeyear_usd: {dist: loguniform, low: 100000, high: 300000}
    chc_fraction_of_medicare: {dist: uniform, low: 0.125, high: 0.333}
    source: >-
      Bailey & Goodman-Bacon (2015), AER 105(3): CHCs cut mortality among 50+
      by ~2% within a decade, achieving the reduction at 1/8 to 1/3 the cost
      of the equivalent reduction through Medicare.

  health_mental:
    label: "Health - mental & behavioral"
    allocation_share: 0.04
    method: cost_per_qaly
    cost_per_qaly_usd: {dist: lognormal_ci, low: 15000, high: 90000}
    source: >-
      Collaborative-care depression systematic reviews (e.g., Jacob et al.;
      community guide): ICERs ~$17k-$49.5k/QALY (healthcare perspective),
      adolescents $18,239/QALY; program cost $104-$639/person/yr.

  econ_cash:
    label: "Economic security - cash & financial"
    allocation_share: 0.08
    method: cost_per_qaly
    cost_per_qaly_usd: {dist: lognormal_ci, low: 80000, high: 2000000}
    source: >-
      Cesarini et al. (2016, QJE) lottery study finds ~zero causal effect of
      income on adult mortality in a rich country; EITC health effects exist
      but are contested/confounded. Most value here is non-health consumption
      and wellbeing, which QALYs do not capture -> high $/QALY, wide.

  econ_food:
    label: "Economic security - food security"
    allocation_share: 0.07
    method: cost_per_qaly
    cost_per_qaly_usd: {dist: lognormal_ci, low: 20000, high: 200000}
    source: >-
      CBPP evidence syntheses; food-is-medicine RCTs. SNAP associated with
      ~$1,400/yr lower health costs and ~4% fewer hospitalizations (46% among
      food-insecure seniors). Observational/confounded -> downward-adjusted.

  econ_housing:
    label: "Economic security - housing & homelessness"
    allocation_share: 0.08
    method: cost_per_qaly
    cost_per_qaly_usd: {dist: lognormal_ci, low: 20000, high: 150000}
    source: >-
      NASEM (2018) Permanent Supportive Housing review; Housing & Health Study
      ~$62,493/QALY; PSH frequently cost-saving ($6,875-$33,502/person/yr) for
      high-need chronically homeless.

  econ_workforce:
    label: "Economic security - workforce & mobility"
    allocation_share: 0.08
    method: cost_per_qaly
    cost_per_qaly_usd: {dist: lognormal_ci, low: 40000, high: 600000}
    source: >-
      Indirect health via earnings (income-health gradient with a causal
      discount, consistent with Cesarini et al.). Most value is economic, not
      health -> high $/QALY, wide.

  education:
    label: "Education (HBCUs, comm. college, scholarships)"
    allocation_share: 0.18
    method: cost_per_qaly
    cost_per_qaly_usd: {dist: lognormal_ci, low: 40000, high: 600000}
    source: >-
      van Kippersluis et al. (2011, J. Health Econ., Dutch reform): +1 yr
      schooling -> ~6% lower mortality; Lleras-Muney (2005); Card returns to
      schooling. Long lag; large non-health (earnings) value excluded.

  equity_justice:
    label: "Equity & justice"
    allocation_share: 0.22
    method: cost_per_qaly
    cost_per_qaly_usd: {dist: lognormal_ci, low: 50000, high: 2000000}
    source: >-
      Racial equity, criminal-justice reform, immigration, gender. Health
      pathway is weak/indirect (e.g., reduced incarceration); most value is
      non-health (rights, fairness, opportunity). Very wide.

  civic_democracy:
    label: "Civic / democracy / philanthropy infra"
    allocation_share: 0.04
    method: cost_per_qaly
    cost_per_qaly_usd: {dist: lognormal_ci, low: 100000, high: 5000000}
    source: >-
      Negligible direct health pathway; value is civic and institutional.

  arts_culture:
    label: "Arts & culture"
    allocation_share: 0.03
    method: cost_per_qaly
    cost_per_qaly_usd: {dist: lognormal_ci, low: 200000, high: 10000000}
    source: >-
      Negligible direct health pathway; wellbeing value not captured by QALYs.

  environment:
    label: "Environment / climate"
    allocation_share: 0.04
    method: cost_per_qaly
    cost_per_qaly_usd: {dist: lognormal_ci, low: 25000, high: 2000000}
    source: >-
      Bressler (2021, Nature Communications) mortality cost of carbon:
      ~4,434 tCO2 per excess death (2020-2100). Effective $/QALY depends
      entirely on abatement leverage of the gift -> speculative, very wide.

  other_community:
    label: "Other / general community"
    allocation_share: 0.03
    method: cost_per_qaly
    cost_per_qaly_usd: {dist: lognormal_ci, low: 30000, high: 400000}
    source: "Blended social-services proxy for unclassified giving."
